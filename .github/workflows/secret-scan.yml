name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "${RUNNER_TEMP}/${archive}"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          chmod +x "${RUNNER_TEMP}/gitleaks"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        shell: bash
        run: |
          gitleaks detect --source . --redact --no-banner --verbose